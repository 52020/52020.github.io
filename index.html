<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>亲亲小黎宝宝 | 月经周期记录 · 温柔絮语</title>
    <style>
        /* 全局样式重置 + 原有精美设计保留 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 页面主体样式 - 更细腻的渐变背景 + 噪点纹理 */
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #fec8d8 50%, #fcb69f 75%, #ffecd2 100%);
            background-size: 400% 400%;
            animation: gradientAnimation 20s ease infinite;
            min-height: 100vh;
            padding: 2rem;
            color: #333;
            position: relative;
        }

        /* 背景噪点纹理 - 增加质感 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffffff' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }

        /* 背景渐变动画 - 更缓慢自然 */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 容器样式 - 增强玻璃拟态 + 精致阴影 (层级稍高保证可读) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 
                0 10px 40px rgba(255, 107, 107, 0.12),
                0 1px 3px rgba(0, 0, 0, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            padding: 3.5rem;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        /* 容器顶部装饰条 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e, #ffb7b7, #ff8e8e, #ff6b6b);
            border-radius: 24px 24px 0 0;
        }

        /* 标题样式 */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 122, 122, 0.15);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff8e8e, transparent);
        }

        .header h1 {
            background: linear-gradient(90deg, #d63384, #ff4d6d, #ff758f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.8rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-shadow: 0 4px 8px rgba(255, 107, 107, 0.12);
            position: relative;
        }

        .header p {
            color: #7d5a5a;
            font-size: 1.2rem;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        /* 月份网格布局 */
        .period-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
        }

        /* 月份卡片样式 */
        .month-card {
            background: linear-gradient(120deg, #fff0f3 0%, #ffe8ec 50%, #fff5f7 100%);
            border-radius: 18px;
            padding: 2rem 1.8rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 159, 159, 0.15);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .month-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e, #ffa8a8);
        }

        .month-card::after {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 80px;
            height: 80px;
            background: rgba(255, 107, 107, 0.06);
            border-radius: 50%;
            filter: blur(15px);
        }

        .month-card .decor-dot {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 6px;
            height: 6px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
        }

        .month-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.18), 0 5px 15px rgba(255, 107, 107, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.95);
            background: linear-gradient(120deg, #fff5f8 0%, #fff0f5 100%);
        }

        .month-title {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(90deg, #d63384, #ff4d6d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
        }

        .month-title::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
        }

        .period-date {
            font-size: 1.3rem;
            color: #6a4f55;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-left: 0.8rem;
            font-weight: 400;
        }

        .period-date::before {
            content: '📅';
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 3px rgba(255, 107, 107, 0.1));
        }

        .period-date span {
            font-weight: 700;
            color: #d63384;
            font-size: 1.4rem;
            position: relative;
        }

        .period-date span::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
            border-radius: 1px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .month-card:hover .period-date span::after {
            transform: scaleX(1);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 1.5rem;
            }
            .container {
                padding: 2rem 1.8rem;
                border-radius: 20px;
            }
            .period-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .header p {
                font-size: 1.1rem;
            }
            .month-card {
                padding: 1.8rem 1.5rem;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .period-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        html {
            scroll-behavior: smooth;
        }

        /* ========= 强化版浮动絮语样式：更明显、清晰、有存在感 ========= */
        .floating-messages-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;      /* 让所有漂浮文字不干扰点击卡片 */
            overflow: hidden;
            z-index: 30;
        }

        .floating-word {
            position: absolute;
            white-space: nowrap;
            font-size: 1.2rem;
            font-weight: 700;          /* 加粗更醒目 */
            color: #b13e63;            /* 深暖粉色，对比鲜明 */
            background: rgba(255, 245, 235, 0.96);  /* 高实感背景，几乎不透明，明显清晰 */
            backdrop-filter: blur(2px);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            letter-spacing: 0.8px;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', cursive;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(255, 255, 255, 0.8) inset;
            border: 1px solid rgba(255, 180, 160, 0.7);
            transition: transform 0.1s ease;
            animation: floatUpClear 4.8s ease-out forwards;
            will-change: transform, opacity;
            white-space: normal;
            max-width: 280px;
            word-break: keep-all;
            line-height: 1.4;
            text-align: center;
            text-shadow: 0 1px 1px rgba(255,255,200,0.6);
            backdrop-filter: blur(0px);   /* 完全无模糊，保证文字锐利 */
        }

        /* 让长句自适应换行 */
        @media (max-width: 550px) {
            .floating-word {
                max-width: 220px;
                font-size: 1rem;
                padding: 0.35rem 1rem;
            }
        }

        /* 清晰动画：没有模糊入场，全程清晰上浮消失 */
        @keyframes floatUpClear {
            0% {
                opacity: 0;
                transform: translateY(0px) translateX(0) scale(0.92);
            }
            12% {
                opacity: 1;
                transform: translateY(-8px) translateX(3px) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateY(-40px) translateX(-2px) scale(1.02);
            }
            80% {
                opacity: 0.85;
                transform: translateY(-85px) translateX(4px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-130px) translateX(-3px) scale(0.96);
            }
        }

        /* 第二种随机动画：微微摇摆但同样清晰 */
        @keyframes floatSwayClear {
            0% {
                opacity: 0;
                transform: translateY(0px) rotate(0deg);
            }
            15% {
                opacity: 1;
                transform: translateY(-10px) rotate(2deg);
            }
            55% {
                opacity: 1;
                transform: translateY(-55px) rotate(-1deg);
            }
            85% {
                opacity: 0.8;
                transform: translateY(-95px) rotate(1deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-140px) rotate(2deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 text="亲亲小黎宝宝">亲亲小黎宝宝</h1>
            <p>月经周期记录</p>
        </div>
        
        <!-- 统一的记录容器 -->
        <div class="period-grid" id="periodRecords">
            <!-- 月份卡片将通过JS动态生成 -->
        </div>
    </div>

    <!-- 浮动絮语层：背景动画效果，很多话浮现然后消失，现在更加明显清晰 -->
    <div class="floating-messages-container" id="floatingContainer"></div>

    <script>
        // ---------- 月经数据渲染（保持原有功能，倒序展示：最新月份在前）----------
        const monthData = [
            { year: 2025, month: '10月', day: 5 },
            { year: 2025, month: '11月', day: 2 },
            { year: 2025, month: '12月', day: 31 },
            { year: 2026, month: '1月', day: 27 },
            { year: 2026, month: '2月', day: 28 }
        ];

        function renderPeriodCards() {
            const container = document.getElementById('periodRecords');
            if (!container) return;
            container.innerHTML = ''; 
            // 倒序（最新的在前面）：复制一份再reverse
            const reversed = [...monthData].reverse();
            
            reversed.forEach(item => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `
                    <div class="month-title">${item.year}年${item.month}</div>
                    <div class="period-date">
                        时间：<span>${item.day}日</span>
                    </div>
                    <div class="decor-dot"></div>
                `;
                container.appendChild(card);
            });
        }

        // ---------- 全新絮语文案：完全按照要求，更明显且包含所有指定语句 ----------
        // 包含核心指令: “火鸡面不准把辣椒全放”“冷冷的柠檬水慢点喝”“亲亲小黎宝宝”及所有暖心关怀
        // 并多次重复重点词汇以保证高频浮现
        const tenderMessages = [
            // 用户指定核心句 (明显展示)
            "🔥 火鸡面不准把辣椒全放",
            "🍋 冷冷的柠檬水慢点喝",
            "💖 亲亲小黎宝宝",
            "💤 早点休息",
            "🍵 红糖姜茶",
            "✨ 抱抱宝宝",
            "🌼 温柔待己",
            "🧘‍♀️ 深呼吸",
            "✨ 你最珍贵",
            "🥣 清淡饮食",
            "🌷 暖暖的",
            "🍬 小黎辛苦啦",
            // 额外增加相同重要句子提高出现频率，更明显
            "🔥 火鸡面不准把辣椒全放",
            "🍋 冷冷的柠檬水慢点喝",
            "💖 亲亲小黎宝宝",
            "💤 早点休息",
            "🍵 红糖姜茶",
            "✨ 抱抱宝宝",
            "🌼 温柔待己",
            "🧘‍♀️ 深呼吸",
            "✨ 你最珍贵",
            "🥣 清淡饮食",
            "🌷 暖暖的",
            "🍬 小黎辛苦啦",
            // 再加一点温度提示，让背景一直充满关怀
            "💕 少辣多暖",
            "🌸 热水袋准备好",
            "🕯️ 温柔入眠",
            "🍎 补充维C",
            "🌙 别熬夜呀",
            "🍫 来块巧克力",
            "🔥 火鸡面少放辣",
            "🍋 柠檬水慢慢喝",
            "💗 亲亲抱抱"
        ];

        // 获取随机一句絮语
        function getRandomMessage() {
            const randomIndex = Math.floor(Math.random() * tenderMessages.length);
            return tenderMessages[randomIndex];
        }

        // 随机范围函数
        function randomRange(min, max) {
            return min + Math.random() * (max - min);
        }

        // 创建单个浮动词条，明显清晰，动画结束后自动移除
        function createFloatingWord() {
            const container = document.getElementById('floatingContainer');
            if (!container) return;
            
            const wordDiv = document.createElement('div');
            wordDiv.className = 'floating-word';
            let message = getRandomMessage();
            // 保证部分语句带有emoji但保留完整语义，为了让“亲亲小黎宝宝”更突出，可加上小爱心（已经自带）
            wordDiv.textContent = message;
            
            // 随机位置 (视口百分比，避免边缘遮挡)
            const leftPos = randomRange(3, 92);     
            const topPos = randomRange(2, 88);      
            
            // 随机字体大小 1.05rem ~ 1.9rem 更明显
            const fontSize = randomRange(1.05, 1.9);
            // 随机动画时长 (4s ~ 7s 自然飘移)
            const duration = randomRange(4, 6.8);
            // 随机选择两种清晰动画风格之一
            const animationName = Math.random() > 0.55 ? 'floatUpClear' : 'floatSwayClear';
            
            // 随机微旋转起始
            const rotateStart = randomRange(-4, 4);
            
            // 应用样式：加强明显效果
            wordDiv.style.left = leftPos + '%';
            wordDiv.style.top = topPos + '%';
            wordDiv.style.fontSize = fontSize + 'rem';
            wordDiv.style.animation = `${animationName} ${duration}s ease-out forwards`;
            wordDiv.style.transform = `rotate(${rotateStart}deg)`;
            // 背景色彩更饱满些但保持清晰对比
            const warmBg = ['rgba(255, 245, 235, 0.98)', 'rgba(255, 240, 230, 0.98)', 'rgba(255, 235, 225, 0.98)'];
            wordDiv.style.backgroundColor = warmBg[Math.floor(Math.random() * warmBg.length)];
            // 增加边框轻微光泽
            wordDiv.style.border = '1px solid rgba(255, 150, 130, 0.6)';
            wordDiv.style.boxShadow = '0 8px 20px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(255,245,210,0.8) inset';
            wordDiv.style.fontWeight = '700';
            wordDiv.style.color = '#aa3e62';
            // 添加轻微文字光晕使其更突出
            wordDiv.style.textShadow = '0 1px 2px rgba(255,255,220,0.9)';
            
            // 针对特定长句增加一点宽度适配
            if (message.includes('火鸡面不准把辣椒全放') || message.includes('冷冷的柠檬水慢点喝')) {
                wordDiv.style.maxWidth = '320px';
                wordDiv.style.padding = '0.45rem 1.2rem';
                wordDiv.style.fontSize = parseFloat(fontSize) + 0.05 + 'rem';
            }
            if (message.includes('亲亲小黎宝宝')) {
                // 让这句更甜一点，背景微粉
                wordDiv.style.backgroundColor = '#fff4ef';
                wordDiv.style.border = '1px solid #ffb7a3';
                wordDiv.style.color = '#c94f6e';
            }
            
            container.appendChild(wordDiv);
            
            // 动画结束后移除元素，防止内存堆积
            const onAnimationFinish = () => {
                if (wordDiv && wordDiv.parentNode) {
                    wordDiv.remove();
                }
            };
            wordDiv.addEventListener('animationend', onAnimationFinish, { once: true });
            
            // 保险移除：最长时间后移除
            setTimeout(() => {
                if (wordDiv && wordDiv.parentNode) wordDiv.remove();
            }, duration * 1000 + 600);
        }
        
        // 启动浮动絮语生成器 —— 让许多话持续浮现消失，背景明显又充满关怀
        function startFloatingMessages() {
            let timer = null;
            function scheduleNext() {
                // 随机间隔 0.65秒 ~ 2.0秒 生成一个浮动词条，较为密集，话多明显
                const nextDelay = randomRange(650, 1950);
                timer = setTimeout(() => {
                    createFloatingWord();
                    scheduleNext();
                }, nextDelay);
            }
            // 启动时连续生成4~5个，让背景立刻热闹且明显
            const initialCount = Math.floor(randomRange(4, 7));
            for (let i = 0; i < initialCount; i++) {
                setTimeout(() => createFloatingWord(), i * 280);
            }
            scheduleNext();
            window._floatingTimer = timer;
        }
        
        // 可选: 增加resize不影响功能，保持所有卡片和浮动
        function init() {
            renderPeriodCards();       // 渲染月经记录卡片
            startFloatingMessages();   // 开启明显絮语动画，很多话浮现消失
        }
        
        // 页面完全加载后执行
        window.addEventListener('DOMContentLoaded', init);
        
        // 清理定时器不是必须但保持优雅（页面关闭自动停止）
    </script>
</body>
</html>
